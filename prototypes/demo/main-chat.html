<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메인 대화 화면</title>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 팔레트 */
      --cream: #F2EFE9;
      --warm-beige: #BFBFAA;
      --olive-brown: #736D53;
      --dark-brown: #403933;
      --near-black: #0D0D0D;
      
      /* Orb 색상 */
      --orb-idle-light: #E8E4D9;
      --orb-idle-mid: #D4CFC0;
      --orb-idle-dark: #BFBAA8;
      
      --orb-listening-light: #F5F0E0;
      --orb-listening-mid: #E8DFC8;
      --orb-listening-dark: #D9CEB2;
      
      --orb-thinking-light: #C8D4C0;
      --orb-thinking-mid: #A8B8A0;
      --orb-thinking-dark: #8A9C82;
      
      --orb-speaking-light: #E8D8C0;
      --orb-speaking-mid: #D9C4A0;
      --orb-speaking-dark: #C9B088;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--near-black);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      width: 375px;
      height: 812px;
      background: linear-gradient(180deg, var(--near-black) 0%, #1A1714 100%);
      border-radius: 50px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    }

    /* 다이나믹 아일랜드 */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    /* 상단 토글 탭 */
    .top-tabs {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 20px;
      z-index: 10;
    }

    .top-tab {
      padding: 10px 20px;
      border: 1px solid rgba(115, 109, 83, 0.5);
      background: rgba(64, 57, 51, 0.3);
      color: rgba(242, 239, 233, 0.9);
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .top-tab:hover {
      background: rgba(64, 57, 51, 0.5);
      box-shadow: 0 0 20px rgba(191, 191, 170, 0.2);
    }

    .top-tab.active {
      background: rgba(115, 109, 83, 0.4);
      border-color: rgba(191, 191, 170, 0.6);
      box-shadow: 0 0 20px rgba(191, 191, 170, 0.3);
    }

    /* 메인 컨텐츠 */
    .content {
      position: absolute;
      top: 110px;
      left: 0;
      right: 0;
      bottom: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }

    /* Orb 컨테이너 */
    .orb-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 24px;
    }

    .orb {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, 
        rgba(232, 228, 217, 0.95) 0%, 
        rgba(212, 207, 192, 0.8) 50%, 
        rgba(191, 186, 168, 0.6) 100%);
      box-shadow: 
        0 0 60px rgba(212, 207, 192, 0.5),
        0 0 100px rgba(212, 207, 192, 0.3),
        0 0 140px rgba(212, 207, 192, 0.15),
        inset 0 0 40px rgba(255, 255, 255, 0.3);
      animation: float 4s ease-in-out infinite;
      transition: all 0.5s ease;
    }

    .eyes {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 18px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .eye {
      width: 5px;
      height: 10px;
      background: rgba(64, 57, 51, 0.8);
      border-radius: 50%;
      animation: blink 4s ease-in-out infinite;
    }

    .glow-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(212, 207, 192, 0.35);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    .glow-ring:nth-child(1) { width: 110px; height: 110px; }
    .glow-ring:nth-child(2) { width: 130px; height: 130px; animation-delay: 0.8s; }
    .glow-ring:nth-child(3) { width: 150px; height: 150px; animation-delay: 1.6s; }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
      50% { transform: translate(-50%, -50%) translateY(-15px); }
    }

    @keyframes blink {
      0%, 42%, 58%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }

    @keyframes pulse-ring {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    /* 메시지 영역 */
    .message-area {
      width: 100%;
      max-width: 320px;
      min-height: 60px;
      text-align: center;
    }

    .ai-message {
      color: var(--cream);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      opacity: 0.9;
    }

    .ai-message.streaming::after {
      content: '▊';
      animation: cursor-blink 1s infinite;
      margin-left: 2px;
      opacity: 0.7;
    }

    @keyframes cursor-blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* 입력 영역 */
    .input-area {
      position: absolute;
      bottom: 100px;
      left: 20px;
      right: 20px;
    }

    .input-box {
      display: flex;
      align-items: center;
      background: rgba(64, 57, 51, 0.3);
      border: 1px solid rgba(115, 109, 83, 0.3);
      border-radius: 28px;
      padding: 0 16px;
      height: 56px;
      gap: 12px;
    }

    .input-text {
      flex: 1;
      background: none;
      border: none;
      color: var(--cream);
      font-size: 14px;
      outline: none;
    }

    .input-text::placeholder {
      color: var(--olive-brown);
      opacity: 0.6;
    }

    .voice-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(115, 109, 83, 0.3);
      border: none;
      color: var(--cream);
      font-size: 12px;
      cursor: not-allowed;
      opacity: 0.5;
      transition: all 0.2s ease;
    }

    .voice-btn i {
      font-size: 14px;
    }

    .voice-btn.hidden {
      display: none;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(115, 109, 83, 0.6);
      border: none;
      color: var(--cream);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .send-btn:hover {
      background: rgba(191, 191, 170, 0.5);
    }

    .send-btn.hidden {
      display: none;
    }

    /* 탭바 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 83px;
      background: rgba(13, 13, 13, 0.95);
      border-top: 1px solid rgba(115, 109, 83, 0.15);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 12px;
      backdrop-filter: blur(20px);
    }

    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-icon {
      font-size: 26px;
      color: var(--olive-brown);
      opacity: 0.5;
      transition: all 0.2s ease;
    }

    .tab-label {
      font-size: 10px;
      color: var(--olive-brown);
      opacity: 0.6;
      transition: all 0.2s ease;
    }

    .tab.active .tab-icon {
      color: var(--cream);
      opacity: 1;
    }

    .tab.active .tab-label {
      color: var(--cream);
      opacity: 1;
    }

    /* 상태별 Orb 스타일 */
    .orb-wrapper.listening .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(245, 240, 224, 0.95) 0%, 
        rgba(232, 223, 200, 0.85) 50%, 
        rgba(217, 206, 178, 0.7) 100%);
      box-shadow: 
        0 0 50px rgba(232, 223, 200, 0.6),
        0 0 80px rgba(232, 223, 200, 0.4);
      animation: focus-in 2s ease-in-out infinite;
    }

    .orb-wrapper.listening .eyes,
    .orb-wrapper.thinking .eyes,
    .orb-wrapper.speaking .eyes {
      opacity: 1;
    }

    @keyframes focus-in {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(0.92); }
    }

    .orb-wrapper.thinking .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(200, 212, 192, 0.95) 0%, 
        rgba(168, 184, 160, 0.85) 50%, 
        rgba(138, 156, 130, 0.7) 100%);
      box-shadow: 
        0 0 60px rgba(168, 184, 160, 0.5),
        0 0 100px rgba(168, 184, 160, 0.35);
    }

    .orb-wrapper.thinking .eye {
      width: 10px;
      height: 4px;
      border-radius: 3px;
    }

    .orb-wrapper.speaking .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(232, 216, 192, 0.98) 0%, 
        rgba(217, 196, 160, 0.88) 50%, 
        rgba(201, 176, 136, 0.75) 100%);
      box-shadow: 
        0 0 80px rgba(217, 196, 160, 0.65),
        0 0 120px rgba(217, 196, 160, 0.45);
      animation: speaking-pulse 1.2s ease-in-out infinite;
    }

    @keyframes speaking-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.03); }
    }

    /* 데모 컨트롤 */
    .demo-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    .demo-btn {
      padding: 8px 16px;
      border: 1px solid var(--olive-brown);
      background: var(--dark-brown);
      color: var(--cream);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .demo-btn:hover {
      background: var(--olive-brown);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="dynamic-island"></div>
    
    <!-- 상단 토글 탭 -->
    <div class="top-tabs">
      <button class="top-tab active">Main</button>
      <button class="top-tab" onclick="location.href='history.html'">History</button>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="content">
      <div class="orb-wrapper" id="orbWrapper">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="orb">
          <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
        </div>
      </div>

      <div class="message-area">
        <p class="ai-message" id="aiMessage"></p>
      </div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-area">
      <div class="input-box">
        <input type="text" class="input-text" placeholder="메세지 입력" id="inputText">
        <button class="voice-btn" id="voiceBtn" disabled>
          <i class="ph-light ph-waveform"></i>
          <span>음성</span>
        </button>
        <button class="send-btn hidden" id="sendBtn"><i class="ph-light ph-arrow-up"></i></button>
      </div>
    </div>

    <!-- 탭바 -->
    <div class="tab-bar">
      <div class="tab active">
        <i class="ph-light ph-chat-circle tab-icon"></i>
        <span class="tab-label">대화</span>
      </div>
      <div class="tab">
        <i class="ph-light ph-identification-badge tab-icon"></i>
        <span class="tab-label">AI 프로필</span>
      </div>
      <div class="tab">
        <i class="ph-light ph-book-open tab-icon"></i>
        <span class="tab-label">다이어리</span>
      </div>
      <div class="tab">
        <i class="ph-light ph-user-circle tab-icon"></i>
        <span class="tab-label">마이페이지</span>
      </div>
    </div>
  </div>

  <!-- 데모 컨트롤 -->
  <div class="demo-controls">
    <button class="demo-btn" onclick="simulateFlow()">대화 시뮬레이션</button>
    <button class="demo-btn" onclick="setState('idle')">Idle</button>
    <button class="demo-btn" onclick="setState('listening')">Listening</button>
    <button class="demo-btn" onclick="setState('thinking')">Thinking</button>
    <button class="demo-btn" onclick="setState('speaking')">Speaking</button>
  </div>

  <script>
    const orbWrapper = document.getElementById('orbWrapper');
    const aiMessage = document.getElementById('aiMessage');
    const inputText = document.getElementById('inputText');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');

    let currentState = 'idle';

    // 입력 여부에 따라 버튼 전환
    inputText.addEventListener('input', () => {
      if (inputText.value.trim().length > 0) {
        voiceBtn.classList.add('hidden');
        sendBtn.classList.remove('hidden');
      } else {
        voiceBtn.classList.remove('hidden');
        sendBtn.classList.add('hidden');
      }
    });
    let blobInterval = null;

    // Blob 설정
    const blobConfig = {
      idle: { variance: 15, interval: 2500 },
      listening: { variance: 8, interval: 1500 },
      thinking: { variance: 10, interval: 2000 },
      speaking: { variance: 12, interval: 1000 }
    };

    function randomBlob(variance) {
      const base = 50;
      const r = () => base + (Math.random() - 0.5) * variance * 2;
      return `${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%`;
    }

    function startBlobAnimation() {
      const orb = document.querySelector('.orb');
      const config = blobConfig[currentState];
      
      if (blobInterval) clearTimeout(blobInterval);
      
      orb.style.borderRadius = randomBlob(config.variance);
      
      function scheduleNext() {
        const jitter = config.interval * (0.7 + Math.random() * 0.6);
        blobInterval = setTimeout(() => {
          orb.style.borderRadius = randomBlob(config.variance);
          scheduleNext();
        }, jitter);
      }
      scheduleNext();
    }

    function setState(state) {
      currentState = state;
      orbWrapper.className = 'orb-wrapper ' + state;
      startBlobAnimation();
    }

    // 스트리밍 효과
    async function streamText(text) {
      aiMessage.textContent = '';
      aiMessage.classList.add('streaming');
      
      for (let i = 0; i < text.length; i++) {
        aiMessage.textContent += text[i];
        await new Promise(r => setTimeout(r, 30 + Math.random() * 30));
      }
      
      aiMessage.classList.remove('streaming');
    }

    // 대화 시뮬레이션
    async function simulateFlow() {
      // 선톡 (Speaking)
      setState('speaking');
      await streamText('안녕! 오늘 하루는 어땠어?');
      
      await new Promise(r => setTimeout(r, 2000));
      
      // Idle로 대기
      setState('idle');
      
      // 사용자 입력 대기 시뮬레이션
      await new Promise(r => setTimeout(r, 1500));
      inputText.value = '오늘 회사에서 재밌는 일이 있었어';
      
      await new Promise(r => setTimeout(r, 1000));
      
      // Listening
      setState('listening');
      await new Promise(r => setTimeout(r, 1500));
      
      // Thinking
      setState('thinking');
      inputText.value = '';
      aiMessage.textContent = '';
      await new Promise(r => setTimeout(r, 2000));
      
      // Speaking (응답)
      setState('speaking');
      await streamText('오 진짜? 무슨 일이었는데? 궁금하다 ㅎㅎ');
      
      await new Promise(r => setTimeout(r, 1500));
      setState('idle');
    }

    // 초기화
    startBlobAnimation();

    // 탭 전환
    document.querySelectorAll('.top-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // 탭바 전환
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
