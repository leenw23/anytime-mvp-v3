<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orb - Warm Neutral (웜 뉴트럴)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0D0D0D 0%, #1A1714 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .orb-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .orb {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, 
        rgba(232, 228, 217, 0.95) 0%, 
        rgba(212, 207, 192, 0.8) 50%, 
        rgba(191, 186, 168, 0.6) 100%);
      box-shadow: 
        0 0 60px rgba(212, 207, 192, 0.5),
        0 0 100px rgba(212, 207, 192, 0.3),
        0 0 140px rgba(212, 207, 192, 0.15),
        inset 0 0 40px rgba(255, 255, 255, 0.3);
      animation: float 4s ease-in-out infinite, breathe 3s ease-in-out infinite;
    }

    /* 미니멀 눈 */
    .eyes {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 24px;
      z-index: 10;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .eye {
      width: 6px;
      height: 12px;
      background: rgba(64, 57, 51, 0.8);
      border-radius: 50%;
      animation: blink 4s ease-in-out infinite;
    }

    .orb-wrapper.thinking .eyes,
    .orb-wrapper.speaking .eyes {
      opacity: 1;
    }

    /* 더듬이 */
    .antennae {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .antenna {
      position: absolute;
      width: 3px;
      height: 28px;
      background: linear-gradient(to top,
        rgba(191, 186, 168, 0.85) 0%,
        rgba(212, 207, 192, 0.95) 100%
      );
      border-radius: 3px;
      top: -16px;
      right: 22px;
      transform: rotate(20deg);
      transform-origin: bottom center;
    }

    .antenna::after {
      content: '';
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background: radial-gradient(circle,
        rgba(232, 228, 217, 1) 0%,
        rgba(212, 207, 192, 0.9) 100%
      );
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(212, 207, 192, 0.4);
    }

    .glow-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(212, 207, 192, 0.35);
      animation: pulse-ring 3s ease-in-out infinite;
      transition: border-color 0.5s ease;
    }

    .glow-ring:nth-child(2) { 
      width: 160px;
      height: 160px;
      animation-delay: 0.8s; 
    }
    .glow-ring:nth-child(3) { 
      width: 180px;
      height: 180px;
      animation-delay: 1.6s; 
    }

    /* Idle - 웜 크림/베이지 */
    .orb-wrapper.idle .orb,
    .orb-wrapper .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(232, 228, 217, 0.95) 0%, 
        rgba(212, 207, 192, 0.8) 50%, 
        rgba(191, 186, 168, 0.6) 100%);
      animation: float 4s ease-in-out infinite;
      transition: border-radius 2s ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
      50% { transform: translate(-50%, -50%) translateY(-15px); }
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }

    @keyframes blink {
      0%, 42%, 58%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }

    @keyframes pulse-ring {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    /* Listening - 밝은 크림 골드 */
    .orb-wrapper.listening .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(245, 240, 224, 0.95) 0%, 
        rgba(232, 223, 200, 0.85) 50%, 
        rgba(217, 206, 178, 0.7) 100%);
      box-shadow: 
        0 0 50px rgba(232, 223, 200, 0.6),
        0 0 80px rgba(232, 223, 200, 0.4),
        0 0 120px rgba(232, 223, 200, 0.25),
        inset 0 0 40px rgba(255, 255, 255, 0.35);
      animation: focus-in 2s ease-in-out infinite;
      transition: border-radius 1s ease-in-out;
    }

    @keyframes focus-in {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(0.92); }
    }

    .orb-wrapper.listening .glow-ring {
      border-color: rgba(232, 223, 200, 0.4);
      animation: pulse-ring-inward 2s ease-in-out infinite;
    }

    .orb-wrapper.listening .glow-ring:nth-child(2) {
      animation-delay: 0.5s;
    }

    .orb-wrapper.listening .glow-ring:nth-child(3) {
      animation-delay: 1s;
    }

    @keyframes pulse-ring-inward {
      0% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
    }

    .orb-wrapper.listening .eyes {
      opacity: 1;
    }

    .orb-wrapper.listening .eye {
      transition: transform 0.8s ease-in-out;
    }

    /* Thinking - 세이지 그린 (사색) */
    .orb-wrapper.thinking .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(200, 212, 192, 0.95) 0%, 
        rgba(168, 184, 160, 0.85) 50%, 
        rgba(138, 156, 130, 0.7) 100%);
      box-shadow: 
        0 0 60px rgba(168, 184, 160, 0.5),
        0 0 100px rgba(168, 184, 160, 0.35),
        0 0 140px rgba(168, 184, 160, 0.2),
        inset 0 0 45px rgba(255, 255, 255, 0.25);
      animation: float 4s ease-in-out infinite, thinking-glow 2s ease-in-out infinite;
      transition: border-radius 1.5s ease-in-out;
    }

    .orb-wrapper.thinking .glow-ring {
      border-color: rgba(168, 184, 160, 0.4);
      animation: pulse-ring-slow 4s ease-in-out infinite;
    }

    .orb-wrapper.thinking .glow-ring:nth-child(2) {
      animation-delay: 1.3s;
    }

    .orb-wrapper.thinking .glow-ring:nth-child(3) {
      animation-delay: 2.6s;
    }

    @keyframes pulse-ring-slow {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.15; }
    }

    .orb-wrapper.thinking .eye {
      width: 10px;
      height: 4px;
      border-radius: 3px;
      transition: transform 1s ease-in-out;
    }

    @keyframes thinking-glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.1); }
    }

    /* Speaking - 웜 앰버/골드 */
    .orb-wrapper.speaking .orb {
      background: radial-gradient(circle at 30% 30%, 
        rgba(232, 216, 192, 0.98) 0%, 
        rgba(217, 196, 160, 0.88) 50%, 
        rgba(201, 176, 136, 0.75) 100%);
      box-shadow: 
        0 0 80px rgba(217, 196, 160, 0.65),
        0 0 120px rgba(217, 196, 160, 0.45),
        0 0 160px rgba(217, 196, 160, 0.25),
        inset 0 0 50px rgba(255, 255, 255, 0.4);
      animation: float 4s ease-in-out infinite, speaking-pulse 1.2s ease-in-out infinite;
      transition: border-radius 0.8s ease-in-out;
    }

    @keyframes speaking-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.03); }
    }

    .orb-wrapper.speaking .glow-ring {
      border-color: rgba(217, 196, 160, 0.45);
      animation: pulse-ring-fast 1.5s ease-in-out infinite;
    }

    .orb-wrapper.speaking .glow-ring:nth-child(2) {
      animation-delay: 0.4s;
    }

    .orb-wrapper.speaking .glow-ring:nth-child(3) {
      animation-delay: 0.8s;
    }

    @keyframes pulse-ring-fast {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
      100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    .orb-wrapper.speaking .eye {
      transition: transform 0.5s ease-in-out;
    }

    .status-text {
      color: rgba(242, 239, 233, 0.8);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: 1px solid rgba(115, 109, 83, 0.5);
      background: rgba(64, 57, 51, 0.3);
      color: rgba(242, 239, 233, 0.9);
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: rgba(64, 57, 51, 0.5);
      box-shadow: 0 0 20px rgba(191, 191, 170, 0.2);
    }

    .btn.active {
      background: rgba(115, 109, 83, 0.4);
      border-color: rgba(191, 191, 170, 0.6);
      box-shadow: 0 0 20px rgba(191, 191, 170, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="orb-wrapper" id="orbWrapper">
      <div class="glow-ring"></div>
      <div class="glow-ring"></div>
      <div class="glow-ring"></div>
      <div class="antennae">
        <div class="antenna"></div>
      </div>
      <div class="orb">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
      </div>
    </div>
    <div class="status-text" id="statusText">Idle</div>
    <div class="controls">
      <button class="btn active" onclick="setState('idle')">Idle</button>
      <button class="btn" onclick="setState('listening')">Listening</button>
      <button class="btn" onclick="setState('thinking')">Thinking</button>
      <button class="btn" onclick="setState('speaking')">Speaking</button>
    </div>
  </div>

  <script>
    let currentState = 'idle';
    let blobInterval = null;
    let eyeInterval = null;

    const blobConfig = {
      idle: { variance: 15, interval: 2500 },
      listening: { variance: 8, interval: 1500 },
      thinking: { variance: 10, interval: 2000 },
      speaking: { variance: 12, interval: 1000 }
    };

    const eyeConfig = {
      idle: null,
      listening: { 
        interval: 2000,
        move: () => {
          const y = -2 + Math.random() * -2;
          const x = (Math.random() - 0.5) * 2;
          return `translate(${x}px, ${y}px)`;
        }
      },
      thinking: { 
        interval: 2500,
        move: () => {
          const x = (Math.random() - 0.5) * 3;
          const scaleY = 0.8 + Math.random() * 0.3;
          return `translateX(${x}px) scaleY(${scaleY})`;
        }
      },
      speaking: { 
        interval: 800,
        move: () => {
          const x = (Math.random() - 0.5) * 6;
          const y = (Math.random() - 0.5) * 2;
          return `translate(${x}px, ${y}px)`;
        }
      }
    };

    function randomBlob(variance) {
      const base = 50;
      const r = () => base + (Math.random() - 0.5) * variance * 2;
      return `${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%`;
    }

    function startBlobAnimation() {
      const orb = document.querySelector('.orb');
      const config = blobConfig[currentState];
      
      if (blobInterval) clearTimeout(blobInterval);
      
      orb.style.borderRadius = randomBlob(config.variance);
      
      function scheduleNext() {
        const jitter = config.interval * (0.7 + Math.random() * 0.6);
        blobInterval = setTimeout(() => {
          orb.style.borderRadius = randomBlob(config.variance);
          scheduleNext();
        }, jitter);
      }
      scheduleNext();
    }

    function startEyeAnimation() {
      const eyes = document.querySelectorAll('.eye');
      const config = eyeConfig[currentState];
      
      if (eyeInterval) clearTimeout(eyeInterval);
      
      if (!config) {
        eyes.forEach(eye => eye.style.transform = '');
        return;
      }
      
      function moveEyes() {
        const transform = config.move();
        eyes.forEach(eye => eye.style.transform = transform);
        
        const jitter = config.interval * (0.6 + Math.random() * 0.8);
        eyeInterval = setTimeout(moveEyes, jitter);
      }
      moveEyes();
    }

    function setState(state) {
      currentState = state;
      const wrapper = document.getElementById('orbWrapper');
      const statusText = document.getElementById('statusText');
      const buttons = document.querySelectorAll('.btn');
      
      wrapper.className = 'orb-wrapper ' + state;
      statusText.textContent = state.charAt(0).toUpperCase() + state.slice(1);
      
      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      startBlobAnimation();
      startEyeAnimation();
    }

    startBlobAnimation();
    startEyeAnimation();
  </script>
</body>
</html>
